# FINRA Secondary (Backup) Simulator - same SessionIDs and database as Primary; different ports.
# Initiator connects to Primary first; on failover connects here. Sequence numbers continue (shared DB).
# Run from project root: java -jar target\fix-simulator.jar secondary   OR   run-secondary.bat

[default]
SimulatorRole=Secondary
PersistMessages=Y
LogToFile=Y
LogToDB=Y
LogToScreen=Y
FileStorePath=data-secondary
UseJdbcStore=Y
ConnectionType=acceptor
SocketAcceptAddress=0.0.0.0
# N = no auto-reset; we honor initiator's ResetSeqNumFlag(141)=Y in Logon (sequence reset to 1).
ResetOnLogon=N
ResetOnLogout=N
ResetOnDisconnect=N
ResetOnError=N
# Allow sending another ResendRequest for the same gap if the first didn't result in a fill (see docs/RESENDREQUEST_AND_SEQUENCE_GAPS.md).
SendRedundantResendRequests=Y
# On Logon: load session from DB (expected seq); if gap, send ResendRequest. Same as Primary for correct FIX behavior.
# Required so we load expected seq from DB on Logon and do not show "MsgSeqNum too high, expecting 1" when sequences are matched.
RefreshOnLogon=Y
EnableNextExpectedMsgSeqNum=Y
NonStopSession=Y
StartTime=00:00:00 US/Eastern
EndTime=23:59:59 US/Eastern
CheckLatency=N
# UseDataDictionary=N: do not validate required tags; no "Required tag missing" reject for any message.
UseDataDictionary=N
DataDictionary=FIX44.xml
BeginString=FIX.4.4
OnBehalfOfSubID=DESK
OnBehalfOfCompID=BROKER

HeartBeat_Required=Y
HeartBtDelay=N
HeartBtDelayCount=10
HeartBtDelayTime=15

# Logon control: same as primary — LogonDelayinSecs read from [default] (30s).
LogonRequired=Y
LogonDelay=Y
LogonDelayinSecs=25

ResponseMsgDelay=N
ResponseMsgDelayTime=15
TraceNotAvailable=N
TraceNotAvailableIntervel=120

# Shutdown: SendLogout_at_Shutdown=Y send Logout to initiator before stopping; N do not send Logout.
SendLogout_at_Shutdown=Y

# Same database as Primary - shared TRACE_FIX_* tables for session state and sequence numbers
JdbcURL=jdbc:sqlserver://192.168.1.14:1433;databaseName=trace_simulator;integratedSecurity=false;encrypt=false;trustServerCertificate=false;statementPoolingCacheSize=10;disableStatementPooling=false;enablePrepareOnFirstPreparedStatementCall=true
JdbcUser=sa
JdbcPassword=System@123
JdbcDriver=com.microsoft.sqlserver.jdbc.SQLServerDriver
JdbcStoreMessagesTableName=TRACE_FIX_MESSAGES
JdbcStoreSessionsTableName=TRACE_FIX_SESSIONS
# Y = log Heartbeats (35=0) to TRACE_FIX_MESSAGES_LOG; N = do not log heartbeats to DB
JdbcLogHeartBeats=Y
JdbcLogIncomingTable=TRACE_FIX_MESSAGES_LOG
JdbcLogOutgoingTable=TRACE_FIX_MESSAGES_LOG
JdbcLogEventTable=TRACE_FIX_EVENT_LOG

FileLogPath=logs-secondary
FileLogHeartbeats=Y
FileIncludeMilliseconds=Y
FileIncludeTimeStampForMessages=Y

SLF4JLogEventCategory=quickfixj.event
SLF4JLogIncomingMessageCategory=quickfixj.msg.incoming
SLF4JLogOutgoingMessageCategory=quickfixj.msg.outgoing
SLF4JLogPrependSessionID=Y
SLF4JLogHeartbeats=Y
ScreenLogEvents=Y
ScreenLogShowIncoming=Y
ScreenLogShowOutgoing=Y
ScreenLogShowHeartBeats=Y

SenderCompID=FNRA
TargetCompID=JPMS

[session]
TargetSubID=44B1
SenderSubID=SP
SocketAcceptPort=64134
NonStopSession=Y

[session]
TargetSubID=44B2
SenderSubID=CA
SocketAcceptPort=64193
NonStopSession=Y

[session]
TargetSubID=44B3
SenderSubID=TS
SocketAcceptPort=64194
NonStopSession=Y
