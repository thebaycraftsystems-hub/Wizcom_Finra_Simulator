# PRIMARY: must use the SAME JdbcURL, JdbcStoreSessionsTableName, and JdbcStoreMessagesTableName as Secondary.
# TRACE_FIX_SESSIONS holds incoming_seqnum / outgoing_seqnum for all FIX sessions — shared so failover does not reset sequences.

[default]
SimulatorRole=Primary
PersistMessages=Y
# DB storage: set LogToDB=Y + UseJdbcStore=Y. Create tables first: run sql/quickfixj_sqlserver_schema.sql in trace_fix database.
LogToFile=Y
LogToDB=Y
LogToScreen=Y
FileStorePath=data
UseJdbcStore=Y
ConnectionType=acceptor
# Bind to all interfaces (0.0.0.0) so any gateway can connect (e.g. 192.168.1.14 or another IP later). Do NOT set to a specific client IP.
SocketAcceptAddress=0.0.0.0
# N = we do not auto-reset; we DO honor initiator's ResetSeqNumFlag(141)=Y in Logon (reset both sides to 1).
ResetOnLogon=N
ResetOnLogout=N
ResetOnDisconnect=N
ResetOnError=N
# When a seq gap is detected we send one ResendRequest; by default we do not send another for the same gap.
# If the initiator does not resend (or ResendRequest was lost), set Y so we can send another ResendRequest and avoid stuck "MsgSeqNum too high" / "Already sent ResendRequest... Not sending another".
SendRedundantResendRequests=Y
# On Logon: load session from DB (expected seq = incoming_seqnum). If incoming msg seq > expected, send ResendRequest for gap. Required so "MsgSeqNum too high, expecting 1" does not appear when DB already has the correct sequence (see docs/RESENDREQUEST_AND_SEQUENCE_GAPS.md).
RefreshOnLogon=Y
# Optional: use NextExpectedMsgSeqNum(789) in Logon for sequence sync (QuickFIX/J 2.3.0 Session.SETTING_ENABLE_NEXT_EXPECTED_MSG_SEQ_NUM).
EnableNextExpectedMsgSeqNum=Y
# Session time: set NonStopSession=Y to allow logon 24/7 (no "Logon attempt not within session time" rejection).
NonStopSession=Y
StartTime=00:00:00 US/Eastern
EndTime=23:59:59 US/Eastern

#HeartBtInt=30  -------------------------DO I NEED TO SET THIS?
CheckLatency=N
# UseDataDictionary=N: do not validate required tags; no "Required tag missing" reject for any message. All messages are passed to the app and get a response.
UseDataDictionary=N
DataDictionary=FIX44.xml
BeginString=FIX.4.4
OnBehalfOfSubID=DESK
OnBehalfOfCompID=BROKER


# --- Simulator behavior ([default] = required keys; override on each [session] as needed) ---
#
# Heartbeat (WizFixApplication): HeartBeat_Required Y = send Heartbeat; N = do not send.
# HeartBtDelay Y = wait HeartBtDelayTime sec before each outbound Heartbeat (app messages queued until sent).
# HeartBtDelayCount = delay every Nth inbound heartbeat in onMessage(Heartbeat) when HeartBtDelay=Y.
HeartBeat_Required=Y
HeartBtDelay=Y
HeartBtDelayCount=10
HeartBtDelayTime=3
#
# Logon (acceptor): set on [default] (required) and override per [session] below.
# LogonRequired Y = send Logon; N = RejectLogon.
# LogonDelay Y = wait LogonDelayinSecs (seconds) in toAdmin before outbound Logon hits the wire; N = immediate.
# Gateway LogonTimeout must be > LogonDelayinSecs (e.g. 15s delay → timeout >= 25–30s). Simulator uses ThreadedSocketAcceptor so TS/CA/SP delays run in parallel (not 45s serial).
# [default] = baseline; override LogonDelay / LogonDelayinSecs per [session] as needed.
LogonRequired=Y
LogonDelay=Y
LogonDelayinSecs=1
#
# Trade / TRACE test: ResponseMsgDelay Y = sleep ResponseMsgDelayTime sec before each AE response (per [session] override OK).
# TraceNotAvailable / TraceNotAvailableIntervel: GLOBAL only ([default]) — toggles REJ mode on all sessions.
ResponseMsgDelay=N
ResponseMsgDelayTime=15
# Y = after EN/CR/CX/HX ack, send SPMA/CAMA/TSMA for eligible dealer trades (not customer/affiliate/locked-in).
SendMatchStatusAck=Y
# Optional delay (seconds) between ack and MA (0 = immediate).
MatchStatusAckDelaySecs=0
TraceNotAvailable=N
TraceNotAvailableIntervel=120
#
# Shutdown (Simulator): SendLogout_at_Shutdown Y = send Logout to that session before stop; N = force disconnect.
# Set on each [session] below (inherits [default] if omitted).
SendLogout_at_Shutdown=Y
#
# Wall-clock session timeout: per [session] — SessionTimeoutRequired, SessionTimeoutSeconds,
# isLogoutRequiredatSessionTimeout, LogOnRejectRequired.

# SessionDateZone: time zone for "current date" when loading max sequence from DB on Logon (default America/New_York). Only rows with creation_time on today in this zone are used.
# SessionDateZone=America/New_York

# SQL Server JDBC — MUST match Secondary exactly (same database + table names) for continuous MsgSeqNum across failover.
# Create tables via sql/quickfixj_sqlserver_schema.sql. For production externalize password (e.g. env or secret store).
JdbcURL=jdbc:sqlserver://192.168.1.14:1433;databaseName=trace_simulator;integratedSecurity=false;encrypt=false;trustServerCertificate=false;statementPoolingCacheSize=10;disableStatementPooling=false;enablePrepareOnFirstPreparedStatementCall=true
JdbcUser=sa
JdbcPassword=System@123
JdbcDriver=com.microsoft.sqlserver.jdbc.SQLServerDriver
JdbcStoreMessagesTableName=TRACE_FIX_MESSAGES
JdbcStoreSessionsTableName=TRACE_FIX_SESSIONS
# Y = log Heartbeats (35=0) to TRACE_FIX_MESSAGES_LOG; N = do not log heartbeats to DB
JdbcLogHeartBeats=Y
JdbcLogIncomingTable=TRACE_FIX_MESSAGES_LOG
JdbcLogOutgoingTable=TRACE_FIX_MESSAGES_LOG
JdbcLogEventTable=TRACE_FIX_EVENT_LOG

FileLogPath=logs	 
FileLogHeartbeats=Y
FileIncludeMilliseconds=Y
FileIncludeTimeStampForMessages=Y

SLF4JLogEventCategory=quickfixj.event
SLF4JLogIncomingMessageCategory=quickfixj.msg.incoming
SLF4JLogOutgoingMessageCategory=quickfixj.msg.outgoing
SLF4JLogPrependSessionID=Y
SLF4JLogHeartbeats=Y
ScreenLogEvents=Y
ScreenLogShowIncoming=Y
ScreenLogShowOutgoing=Y
ScreenLogShowHeartBeats=Y

#WizFixSimlatorVersion=5.0.0

SenderCompID=FNRA
TargetCompID=JPMS
# Gateway (initiator) connects TO this machine: use SocketConnectHost=<simulator host IP> and SocketConnectPort below (same host, any client IP).

# SP — no logon delay (inherits [default] LogonDelay=Y; explicit for clarity)
[session]
TargetSubID=44B1
SenderSubID=SP
SocketAcceptPort=45001
NonStopSession=Y
HeartBeat_Required=Y
HeartBtDelay=Y
HeartBtDelayCount=10
HeartBtDelayTime=3
LogonRequired=Y
LogonDelay=N
LogonDelayinSecs=15
ResponseMsgDelay=N
ResponseMsgDelayTime=15
SendLogout_at_Shutdown=Y
SessionTimeoutRequired=True
SessionTimeoutSeconds=60
isLogoutRequiredatSessionTimeout=False
LogOnRejectRequired=N

# CA — logon delay enabled (override [default])
[session]
TargetSubID=44B2
SenderSubID=CA
SocketAcceptPort=45002
NonStopSession=Y
HeartBeat_Required=Y
HeartBtDelay=Y
HeartBtDelayCount=10
HeartBtDelayTime=3
LogonRequired=Y
LogonDelay=N
LogonDelayinSecs=15
ResponseMsgDelay=N
ResponseMsgDelayTime=15
SendLogout_at_Shutdown=Y
SessionTimeoutRequired=True
SessionTimeoutSeconds=60
isLogoutRequiredatSessionTimeout=False
LogOnRejectRequired=N

# TS — no logon delay
[session]
TargetSubID=44B3
SenderSubID=TS
SocketAcceptPort=45003
NonStopSession=Y
HeartBeat_Required=Y
HeartBtDelay=Y
HeartBtDelayCount=10
HeartBtDelayTime=3
LogonRequired=Y
LogonDelay=N
LogonDelayinSecs=15
ResponseMsgDelay=N
ResponseMsgDelayTime=15
SendLogout_at_Shutdown=Y
SessionTimeoutRequired=True
SessionTimeoutSeconds=60
isLogoutRequiredatSessionTimeout=False
LogOnRejectRequired=N