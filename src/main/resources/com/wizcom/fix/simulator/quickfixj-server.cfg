[default]
PersistMessages=Y
# DB storage: set LogToDB=Y + UseJdbcStore=Y. Create tables first: run sql/quickfixj_sqlserver_schema.sql in trace_fix database.
LogToFile=N
LogToDB=Y
LogToScreen=N
FileStorePath=data
UseJdbcStore=Y
ConnectionType=acceptor
ResetOnLogon=N
ResetOnLogout=N
ResetOnDisconnect=N
ResetOnError=N
#StartTime=00:00:00
#EndTime=23:59:59
StartTime=00:10:00 US/Eastern

# Time of day that this FIX session becomes deactivated. Time in the format of HH:MM:SS, time is represented in UTC	
EndTime=23:59:59 US/Eastern

HeartBtInt=30
CheckLatency=N
UseDataDictionary=Y
DataDictionary=FIX44.xml
BeginString=FIX.4.4
OnBehalfOfSubID=DESK
OnBehalfOfCompID=BROKER

HeartBtDelay=N
HeartBtDelayCount=10
HeartBtDelayTime=15

ResponseMsgDelay=N
ResponseMsgDelayTime=15

TraceNotAvailable=N
TraceNotAvailableIntervel=120

# SQL Server JDBC: database is trace_fix (not "quickfix"). Create tables in trace_fix via sql/quickfixj_sqlserver_schema.sql
# For production consider externalizing password (e.g. env var or separate config not in version control)
JdbcURL=jdbc:sqlserver://192.168.1.14:1433;databaseName=trace_fix;integratedSecurity=false;encrypt=false;trustServerCertificate=false;statementPoolingCacheSize=10;disableStatementPooling=false;enablePrepareOnFirstPreparedStatementCall=true
JdbcUser=sa
JdbcPassword=System@123
JdbcDriver=com.microsoft.sqlserver.jdbc.SQLServerDriver
JdbcStoreMessagesTableName=TRACE_FIX_MESSAGES
JdbcStoreSessionsTableName=TRACE_FIX_SESSIONS
JdbcLogHeartBeats=N
JdbcLogIncomingTable=TRACE_FIX_MESSAGES_LOG
JdbcLogOutgoingTable=TRACE_FIX_MESSAGES_LOG
JdbcLogEventTable=TRACE_FIX_EVENT_LOG

FileLogPath=logs	 
FileLogHeartbeats=Y
FileIncludeMilliseconds=Y
FileIncludeTimeStampForMessages=Y

SLF4JLogEventCategory=quickfixj.event
SLF4JLogIncomingMessageCategory=quickfixj.msg.incoming
SLF4JLogOutgoingMessageCategory=quickfixj.msg.outgoing
SLF4JLogPrependSessionID=Y
SLF4JLogHeartbeats=Y
ScreenLogEvents=N
ScreenLogShowIncoming=N
ScreenLogShowOutgoing=N
ScreenLogShowHeartBeats=N

#WizFixSimlatorVersion=5.0.0

SenderCompID=FNRA
TargetCompID=JPMS

[session]
TargetSubID=44B1
SenderSubID=SP
SocketAcceptPort=64034

[session]
TargetSubID=44B2
SenderSubID=CA
SocketAcceptPort=64093

[session]
TargetSubID=44B3
SenderSubID=TS
SocketAcceptPort=64094